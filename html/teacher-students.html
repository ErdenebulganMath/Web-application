<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduLearn – Сурагчид</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/teacher.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Two-column shell ── */
    .students-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ══ LEFT PANEL ══ */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 24px;
    }

    .lp-header {
      margin-bottom: 2px;
    }
    .lp-header h1 {
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .lp-header h1 i { color: #07437d; font-size: 17px; }
    .lp-header p { font-size: 12px; color: #94a3b8; }

    /* Summary mini cards */
    .lp-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .lp-stat {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(7,67,125,.05);
    }
    .lp-stat-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .lp-stat-val { font-size: 20px; font-weight: 800; color: #0f172a; line-height: 1; }
    .lp-stat-lbl { font-size: 11px; color: #94a3b8; margin-top: 3px; }

    /* Class filter cards */
    .lp-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      padding: 0 2px;
    }

    .cls-filter-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .18s, box-shadow .18s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .cls-filter-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--cls-color, #e2e8f0);
      transition: width .18s;
    }
    .cls-filter-card:hover {
      border-color: var(--cls-color, #cbd5e1);
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      transform: translateX(2px);
    }
    .cls-filter-card.active {
      border-color: var(--cls-color, #07437d);
      box-shadow: 0 4px 18px color-mix(in srgb, var(--cls-color, #07437d) 30%, transparent);
    }
    .cls-filter-card.active::before { width: 6px; }

    .cls-fc-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .cls-filter-card.active .cls-fc-icon { transform: scale(1.08); }

    .cls-fc-info { flex: 1; min-width: 0; }
    .cls-fc-name {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cls-fc-check {
      width: 16px; height: 16px;
      border-radius: 5px;
      border: 1.5px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: transparent;
      background: #fff;
      transition: all .15s;
      flex-shrink: 0;
    }
    .cls-filter-card.active .cls-fc-check {
      background: var(--cls-color, #07437d);
      border-color: var(--cls-color, #07437d);
      color: #fff;
    }

    .cls-fc-meta {
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      gap: 10px;
    }
    .cls-fc-avg {
      font-size: 11px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
    }

    /* All-classes card */
    .cls-filter-all {
      background: #07437d;
      border-color: #07437d;
      color: #fff;
    }
    .cls-filter-all::before { background: rgba(255,255,255,.3); }
    .cls-filter-all .cls-fc-name { color: #fff; }
    .cls-filter-all .cls-fc-meta { color: rgba(255,255,255,.6); }
    .cls-filter-all:hover {
      background: #0a57a0;
      border-color: #0a57a0;
      box-shadow: 0 6px 20px rgba(7,67,125,.35);
    }
    .cls-filter-all.active {
      background: #07437d;
      border-color: #07437d;
      box-shadow: 0 6px 20px rgba(7,67,125,.4);
    }
    .cls-filter-all.active::before { width: 5px; background: rgba(255,255,255,.4); }

    /* ══ RIGHT PANEL ══ */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    /* Search + sort bar */
    .rp-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .rp-search {
      flex: 1;
      position: relative;
    }
    .rp-search i {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 13px;
      pointer-events: none;
    }
    .rp-search input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1.5px solid #e2e8f0;
      border-radius: 11px;
      background: #fff;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #1e293b;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .rp-search input:focus {
      border-color: #07437d;
      box-shadow: 0 0 0 3px rgba(7,67,125,.1);
    }
    .rp-sort {
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 11px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      appearance: none;
      white-space: nowrap;
    }
    .rp-count {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      white-space: nowrap;
      padding: 10px 14px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 11px;
    }
    .rp-count span { color: #07437d; font-weight: 800; }

    /* Table */
    .student-table-wrap {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(7,67,125,.06);
    }
    .student-table { width: 100%; border-collapse: collapse; }
    .student-table thead tr {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .student-table thead th {
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .6px;
      text-align: left;
      white-space: nowrap;
    }
    .student-table thead th:last-child { text-align: right; }
    .student-table tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background .12s;
    }
    .student-table tbody tr:last-child { border-bottom: none; }
    .student-table tbody tr:hover { background: #f8fafc; }
    .student-table td {
      padding: 13px 16px;
      font-size: 13px;
      color: #1e293b;
      vertical-align: middle;
    }
    .student-table td:last-child { text-align: right; }

    .st-name-cell { display: flex; align-items: center; gap: 11px; }
    .st-av {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .st-name  { font-weight: 600; color: #1e293b; margin-bottom: 2px; }
    .st-email { font-size: 11px; color: #94a3b8; }

    .class-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .score-cell { text-align: right; }
    .score-val  { font-size: 15px; font-weight: 800; }
    .score-bar-wrap { width: 80px; margin-left: auto; margin-top: 4px; }
    .score-bar-track { height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .score-bar-fill  { height: 100%; border-radius: 99px; }
    .score-high { color: #065f46; } .bar-high { background: #10b981; }
    .score-mid  { color: #92400e; } .bar-mid  { background: #f59e0b; }
    .score-low  { color: #991b1b; } .bar-low  { background: #ef4444; }

    .rank-badge {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    .rank-1 { background: #fef3c7; color: #92400e; }
    .rank-2 { background: #f1f5f9; color: #475569; }
    .rank-3 { background: #fef9ec; color: #b45309; }
    .rank-n { background: #f1f5f9; color: #94a3b8; font-size: 11px; }

    .no-results {
      text-align: center; padding: 48px 20px; color: #94a3b8;
    }
    .no-results i { font-size: 32px; display: block; margin-bottom: 10px; }

    /* ── Dark mode ── */
    body.dark .lp-header h1 { color: #f1f5f9; }
    body.dark .lp-stat,
    body.dark .cls-filter-card { background: #1a2640; border-color: #1e293b; }
    body.dark .lp-stat-val,
    body.dark .cls-fc-name { color: #f1f5f9; }
    body.dark .cls-filter-all { background: #07437d; }
    body.dark .student-table-wrap { background: #1a2640; border-color: #1e293b; }
    body.dark .student-table thead tr { background: #0f172a; border-color: #1e293b; }
    body.dark .student-table tbody tr:hover { background: #0f172a; }
    body.dark .student-table tbody tr { border-color: #1e293b; }
    body.dark .student-table td { color: #e2e8f0; }
    body.dark .st-name { color: #e2e8f0; }
    body.dark .rp-search input,
    body.dark .rp-sort,
    body.dark .rp-count { background: #1a2640; border-color: #1e293b; color: #94a3b8; }
    body.dark .rp-search input:focus { background: #162032; }

    @media (max-width: 1100px) {
      .students-layout { grid-template-columns: 240px 1fr; }
    }
    @media (max-width: 860px) {
      .students-layout { grid-template-columns: 1fr; }
      .left-panel { position: static; }
      .lp-stats  { grid-template-columns: repeat(4, 1fr); }
      .cls-filters-wrap {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
    }
    @media (max-width: 560px) {
      .lp-stats { grid-template-columns: 1fr 1fr; }
      .student-table thead th:nth-child(4),
      .student-table td:nth-child(4) { display: none; }
      .score-bar-wrap { display: none; }
    }
  </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="page">
<div class="students-layout">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">

    <div class="lp-header">
      <h1><i class="fas fa-user-graduate"></i>Сурагчид</h1>
      <p>Ангиар шүүж харах боломжтой</p>
    </div>

    <!-- Mini stats -->
    <div class="lp-stats">
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#dbeafe;color:#1d4ed8"><i class="fas fa-users"></i></div>
        <div class="lp-stat-val">84</div>
        <div class="lp-stat-lbl">Нийт сурагч</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#d1fae5;color:#065f46"><i class="fas fa-trophy"></i></div>
        <div class="lp-stat-val">88%</div>
        <div class="lp-stat-lbl">Хамгийн өндөр</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#fef3c7;color:#92400e"><i class="fas fa-chart-line"></i></div>
        <div class="lp-stat-val">74%</div>
        <div class="lp-stat-lbl">Нийт дундаж</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#fee2e2;color:#991b1b"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="lp-stat-val">8</div>
        <div class="lp-stat-lbl">Анхааруулга</div>
      </div>
    </div>

    <div class="lp-section-label">Анги сонгох</div>

    <!-- Class filter cards -->
    <div class="cls-filters-wrap" id="classFilterCards"></div>

  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">

    <div class="rp-toolbar">
      <div class="rp-search">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Сурагчийн нэрээр хайх..." oninput="filterStudents()">
      </div>
      <select class="rp-sort" onchange="sortStudents(this.value)">
        <option value="score-desc">Оноогоор ↓</option>
        <option value="score-asc">Оноогоор ↑</option>
        <option value="name-asc">Нэрээр А–Я</option>
        <option value="class">Ангиар</option>
      </select>
      <div class="rp-count" id="rpCount"><span id="rpCountNum">29</span> сурагч</div>
    </div>

    <div class="student-table-wrap">
      <table class="student-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Сурагч</th>
            <th>Анги</th>
            <th>Шалгалт</th>
            <th>Даалгавар</th>
            <th style="text-align:right">Дундаж оноо</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
      <div class="no-results" id="noResults" style="display:none">
        <i class="fas fa-search"></i>
        <p>Хайлтад тохирох сурагч олдсонгүй</p>
      </div>
    </div>

  </div>
</div>
</div>

<script src="../js/load.js"></script>
<script>
const PALETTE = [
  { bg: '#dbeafe', tc: '#1d4ed8', btn: '#3b82f6', tag: '#eff6ff', tagTc: '#1d4ed8' },
  { bg: '#d1fae5', tc: '#065f46', btn: '#10b981', tag: '#f0fdf4', tagTc: '#065f46' },
  { bg: '#fef3c7', tc: '#92400e', btn: '#f59e0b', tag: '#fffbeb', tagTc: '#b45309' },
  { bg: '#ede9fe', tc: '#5b21b6', btn: '#8b5cf6', tag: '#f5f3ff', tagTc: '#5b21b6' },
  { bg: '#fee2e2', tc: '#991b1b', btn: '#ef4444', tag: '#fef2f2', tagTc: '#dc2626' },
  { bg: '#cffafe', tc: '#164e63', btn: '#06b6d4', tag: '#ecfeff', tagTc: '#0e7490' },
  { bg: '#fce7f3', tc: '#831843', btn: '#ec4899', tag: '#fdf2f8', tagTc: '#9d174d' },
  { bg: '#d1fae5', tc: '#064e3b', btn: '#059669', tag: '#ecfdf5', tagTc: '#065f46' },
];

function buildClassColors(students) {
  const map = {};
  let i = 0;
  students.forEach(s => {
    if (!map[s.cls]) { map[s.cls] = PALETTE[i % PALETTE.length]; i++; }
  });
  return map;
}

let CLASS_COLORS = {};

const ALL_STUDENTS = [
  { name: 'Болд Бат',        cls: '10А', exams: 4, assigns: 5, score: 92 },
  { name: 'Сарнай Гантулга', cls: '10А', exams: 4, assigns: 5, score: 87 },
  { name: 'Анхбаяр',         cls: '10А', exams: 4, assigns: 4, score: 81 },
  { name: 'Мөнхбаяр',        cls: '10А', exams: 3, assigns: 4, score: 74 },
  { name: 'Цэцэгмаа',        cls: '10А', exams: 3, assigns: 3, score: 63 },
  { name: 'Ариунболд',       cls: '10А', exams: 4, assigns: 5, score: 88 },
  { name: 'Дэлгэрмаа',       cls: '10А', exams: 3, assigns: 4, score: 76 },
  { name: 'Батзориг',        cls: '10А', exams: 4, assigns: 3, score: 69 },
  { name: 'Оюунцэцэг',       cls: '10А', exams: 2, assigns: 3, score: 55 },
  { name: 'Номин Цэцэг',     cls: '9Б',  exams: 3, assigns: 4, score: 88 },
  { name: 'Баярмаа',         cls: '9Б',  exams: 2, assigns: 3, score: 77 },
  { name: 'Сувд',            cls: '9Б',  exams: 2, assigns: 4, score: 72 },
  { name: 'Ундрал',          cls: '9Б',  exams: 2, assigns: 2, score: 65 },
  { name: 'Дорж',            cls: '9Б',  exams: 3, assigns: 4, score: 80 },
  { name: 'Энхтуяа',         cls: '9Б',  exams: 2, assigns: 3, score: 58 },
  { name: 'Мөнгөнцэцэг',    cls: '9Б',  exams: 3, assigns: 4, score: 84 },
  { name: 'Батбаяр',         cls: '9Б',  exams: 1, assigns: 2, score: 51 },
  { name: 'Гэрэлмаа',        cls: '11А', exams: 2, assigns: 3, score: 85 },
  { name: 'Нарантуяа',       cls: '11А', exams: 2, assigns: 3, score: 79 },
  { name: 'Энхбаяр',         cls: '11А', exams: 2, assigns: 2, score: 76 },
  { name: 'Дулгуун',         cls: '11А', exams: 2, assigns: 3, score: 61 },
  { name: 'Лхагвасүрэн',    cls: '11А', exams: 2, assigns: 2, score: 73 },
  { name: 'Алтанцэцэг',     cls: '11А', exams: 1, assigns: 2, score: 57 },
  { name: 'Алтантуяа',       cls: '8В',  exams: 1, assigns: 2, score: 73 },
  { name: 'Оюунчимэг',       cls: '8В',  exams: 1, assigns: 2, score: 68 },
  { name: 'Мөнхзул',         cls: '8В',  exams: 1, assigns: 1, score: 65 },
  { name: 'Төгөлдөр',        cls: '8В',  exams: 1, assigns: 2, score: 54 },
  { name: 'Ганзориг',        cls: '8В',  exams: 1, assigns: 2, score: 60 },
  { name: 'Батсүх',          cls: '8В',  exams: 1, assigns: 1, score: 47 },
];

// class metadata for left panel cards
const CLASS_META = {
  '10А': { subject: 'Алгебр',       avg: '84%', avgCls: 'good' },
  '9Б':  { subject: 'Геометр',      avg: '71%', avgCls: 'mid'  },
  '11А': { subject: 'Тригонометр',  avg: '79%', avgCls: 'good' },
  '8В':  { subject: 'Арифметик',    avg: '62%', avgCls: 'low'  },
};
const AVG_COLORS = {
  good: { bg: '#d1fae5', tc: '#065f46' },
  mid:  { bg: '#fef3c7', tc: '#92400e' },
  low:  { bg: '#fee2e2', tc: '#991b1b' },
};

const selectedClasses = new Set();
let searchTerm = '';
let sortKey    = 'score-desc';

function scoreClass(s) { return s >= 80 ? 'score-high' : s >= 65 ? 'score-mid' : 'score-low'; }
function barClass(s)   { return s >= 80 ? 'bar-high'   : s >= 65 ? 'bar-mid'   : 'bar-low';   }
function rankClass(r)  { return r === 1 ? 'rank-1' : r === 2 ? 'rank-2' : r === 3 ? 'rank-3' : 'rank-n'; }

function renderTable() {
  let data = ALL_STUDENTS.filter(s => {
    const matchClass  = selectedClasses.size === 0 || selectedClasses.has(s.cls);
    const matchSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchClass && matchSearch;
  });

  if (sortKey === 'score-desc') data.sort((a, b) => b.score - a.score);
  else if (sortKey === 'score-asc') data.sort((a, b) => a.score - b.score);
  else if (sortKey === 'name-asc') data.sort((a, b) => a.name.localeCompare(b.name, 'mn'));
  else if (sortKey === 'class') data.sort((a, b) => a.cls.localeCompare(b.cls));

  const tbody  = document.getElementById('studentTableBody');
  const noRes  = document.getElementById('noResults');
  const cntEl  = document.getElementById('rpCountNum');
  if (cntEl) cntEl.textContent = data.length;

  if (!data.length) {
    tbody.innerHTML = '';
    noRes.style.display = '';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = data.map((s, i) => {
    const c   = CLASS_COLORS[s.cls] || { bg: '#f1f5f9', tc: '#475569', tag: '#f1f5f9', tagTc: '#475569' };
    const av  = s.name.charAt(0).toUpperCase();
    const sc  = scoreClass(s.score);
    const bc  = barClass(s.score);
    const rk  = i + 1;
    const rkC = rankClass(rk);
    const rkL = rk <= 3 ? (rk === 1 ? '🥇' : rk === 2 ? '🥈' : '🥉') : rk;
    return `
    <tr>
      <td><div class="rank-badge ${rkC}">${rkL}</div></td>
      <td>
        <div class="st-name-cell">
          <div class="st-av" style="background:${c.bg};color:${c.tc}">${av}</div>
          <div>
            <div class="st-name">${s.name}</div>
            <div class="st-email">${s.name.toLowerCase().replace(/ /g,'')}@school.edu</div>
          </div>
        </div>
      </td>
      <td><span class="class-tag" style="background:${c.tag};color:${c.tagTc}">${s.cls} анги</span></td>
      <td><span style="font-weight:600">${s.exams}</span> <span style="color:#94a3b8;font-size:12px">шалгалт</span></td>
      <td><span style="font-weight:600">${s.assigns}</span> <span style="color:#94a3b8;font-size:12px">даалгавар</span></td>
      <td class="score-cell">
        <div class="score-val ${sc}">${s.score}%</div>
        <div class="score-bar-wrap">
          <div class="score-bar-track">
            <div class="score-bar-fill ${bc}" style="width:${s.score}%"></div>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterStudents() {
  searchTerm = document.getElementById('searchInput').value;
  renderTable();
}
function sortStudents(val) {
  sortKey = val;
  renderTable();
}

function buildClassFilterCards() {
  const wrap = document.getElementById('classFilterCards');

  // Collect class counts
  const classMap = {};
  ALL_STUDENTS.forEach(s => { classMap[s.cls] = (classMap[s.cls] || 0) + 1; });

  // ── "Бүгд" card ──
  const allCard = document.createElement('div');
  allCard.className = 'cls-filter-card cls-filter-all active';
  allCard.style.setProperty('--cls-color', '#07437d');
  allCard.innerHTML = `
    <div class="cls-fc-icon" style="background:rgba(255,255,255,.2);color:#fff">
      <i class="fas fa-layer-group"></i>
    </div>
    <div class="cls-fc-info">
      <div class="cls-fc-name">
        Бүх анги
        <div class="cls-fc-check" style="border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff"><i class="fas fa-check"></i></div>
      </div>
      <div class="cls-fc-meta">
        <span><i class="fas fa-users" style="margin-right:3px"></i>${ALL_STUDENTS.length} сурагч</span>
        <span><i class="fas fa-layer-group" style="margin-right:3px"></i>${Object.keys(classMap).length} анги</span>
      </div>
    </div>`;
  allCard.addEventListener('click', () => {
    selectedClasses.clear();
    wrap.querySelectorAll('.cls-filter-card').forEach(c => c.classList.remove('active'));
    allCard.classList.add('active');
    renderTable();
  });
  wrap.appendChild(allCard);

  // ── Per-class cards ──
  Object.entries(classMap).forEach(([cls, count]) => {
    const c    = CLASS_COLORS[cls] || PALETTE[0];
    const meta = CLASS_META[cls] || { subject: '', avg: '—', avgCls: 'mid' };
    const avgC = AVG_COLORS[meta.avgCls];

    const card = document.createElement('div');
    card.className = 'cls-filter-card';
    card.style.setProperty('--cls-color', c.btn);
    card.innerHTML = `
      <div class="cls-fc-icon" style="background:${c.bg};color:${c.tc}">${cls.charAt(0)}</div>
      <div class="cls-fc-info">
        <div class="cls-fc-name">
          ${cls} анги
          <div class="cls-fc-check"><i class="fas fa-check"></i></div>
        </div>
        <div class="cls-fc-meta">
          <span><i class="fas fa-users" style="margin-right:3px"></i>${count}</span>
          <span style="background:${avgC.bg};color:${avgC.tc};padding:1px 7px;border-radius:20px;font-weight:700">${meta.avg}</span>
        </div>
      </div>`;

    card.addEventListener('click', () => {
      if (selectedClasses.has(cls)) {
        selectedClasses.delete(cls);
        card.classList.remove('active');
      } else {
        selectedClasses.add(cls);
        card.classList.add('active');
        allCard.classList.remove('active');
      }
      if (selectedClasses.size === 0) allCard.classList.add('active');
      renderTable();
    });
    wrap.appendChild(card);
  });
}

// ── Init ──
CLASS_COLORS = buildClassColors(ALL_STUDENTS);
buildClassFilterCards();
renderTable();
</script>
